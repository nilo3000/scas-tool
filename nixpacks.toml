# Railway / Nixpacks configuration
# Install ALL dependencies (including devDependencies) for the build step,
# then start the production server from the compiled output.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
